<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPARISION OPERATIONS</title>
</head>
<h1>COMPARISION OPERATIONS</h1>
<body>
    <script language="javascript">
        var x=2;
        var y=22;
        document.write("is equal to:"+(x==y)+"<br>");
      document.write("is not equal to:"+(x!=y)+"<br>");
     document.write("greater than:"+(x>y)+"<br>");
    document.write("less than:"+(x<y)+"<br>");
     document.write("greater than or equal to:"+(x>=y)+"<br>");
     document.write("less than equal to:"+(x<=y)+"<br>");
     document.write("modules:" +(y%x))
     console.log("ggggg");
 </script>
</body>
</html>
